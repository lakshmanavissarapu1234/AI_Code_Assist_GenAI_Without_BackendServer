<!DOCTYPE html>
<html>

<head>
  <link rel="stylesheet" href="libs/github-dark.min.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #d2c3ff;
    }

    .top-controls {
      padding: 14px 10px 6px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.15);
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    button {
      flex: 1;
      margin: 0;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #767678;
      background: #c7c5c8;
      color: #1a1a1a;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #a9a7aa;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .code-wrapper {
      flex: 1;
      overflow: hidden;
      margin: 6px 10px 0;
      border-radius: 10px;
    }

    .code-wrapper pre {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow-y: auto;
      border-radius: 10px;
      background: #1e1e1e !important;
    }

    #output {
      display: block;
      min-height: 100%;
      background: #1e1e1e !important;
      color: #d4d4d4 !important;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.6;
      font-family: Consolas, "Courier New", monospace;
      padding: 12px !important;
      margin: 0;
      border-radius: 10px;
    }

    .bottom-controls {
      padding: 6px 10px 10px;
      display: flex;
      gap: 10px;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .bottom-controls button {
      padding: 6px;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="top-controls">
    <button id="start">Start Inspect</button>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
  </div>

  <div class="code-wrapper">
    <pre><code id="output" class="language-typescript">Click on Start Inspect to select elements</code></pre>
  </div>

  <div class="bottom-controls">
    <button id="generate">Generate</button>
    <button id="copy">Copy</button>
  </div>

  <!-- highlight.js loaded here BEFORE sidepanel.js -->
  <script src="libs/highlight.min.js"></script>
  <script type="module" src="sidepanel.js"></script>
</body>

</html>
